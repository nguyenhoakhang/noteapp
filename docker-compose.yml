services:
  mysql:
    image: mysql:8.0
    container_name: noteapp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: noteapp
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: noteapp
      MYSQL_PASSWORD: noteapp
    command: >
      --innodb_buffer_pool_size=256M
      --innodb_log_file_size=64M
      --innodb_flush_log_at_trx_commit=2
      --max_connections=100
      --skip-name-resolve
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - noteapp

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: noteapp_backend
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      # Only mount storage for persistence (uploads, avatars)
      # vendor/ is baked into the Docker image at build time
      - backend_storage:/var/www/storage
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=noteapp
      - DB_USERNAME=noteapp
      - DB_PASSWORD=noteapp
      - MAIL_MAILER=smtp
      - MAIL_HOST=mailpit
      - MAIL_PORT=1025
      - MAIL_USERNAME=null
      - MAIL_PASSWORD=null
      - MAIL_ENCRYPTION=null
      - MAIL_FROM_ADDRESS=noteapp@example.com
      - MAIL_FROM_NAME=NoteApp
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-o", "/dev/null", "-s", "http://localhost:8000"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s
    networks:
      - noteapp

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noteapp_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true # ✅ BẮT BUỘC cho HMR trong Docker
    networks:
      - noteapp
    command: sh -c "npm install --no-audit --no-fund && npm run dev -- --host"

  nginx:
    image: nginx:alpine
    container_name: noteapp_nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./backend:/var/www
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - noteapp

  mailpit:
    image: axllent/mailpit:latest
    container_name: noteapp_mailpit
    restart: unless-stopped
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI
    networks:
      - noteapp

volumes:
  mysql_data:
  backend_storage:

networks:
  noteapp:
    driver: bridge
